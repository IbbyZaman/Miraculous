<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miraculous Hub</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin-bottom: 30px;
            background: #000;
            border-radius: 8px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        h1 { color: #e50914; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Miraculous Hub</h1>
        <p>Welcome to the ultimate fan hub!</p>
        
        <hr style="border: 1px solid #333; margin: 30px 0;">

        <!-- Live Stream Section -->
        <h2>Live Stream</h2>
        <div class="video-wrapper">
            <!-- Your Twitch Embed -->
            <iframe src="https://player.twitch.tv/?channel=miraculousto_live&parent=miraculoushub.co.uk" allowfullscreen></iframe>
        </div>

        <!-- Episodes / Main Show Section -->
        <h2>Featured Videos</h2>
        <div class="video-wrapper">
            <!-- Replace the URL below with your YouTube embed link or video link later -->
            <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID_HERE" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
